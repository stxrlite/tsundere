<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tsundere Setup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <aside class="brand">
        <img id="logo" alt="Tsundere" />
        <h1>Tsundere</h1>
        <p>Clean .yuri tooling for serious Discord projects.</p>
        <div class="meta">
          <span id="version">Version</span>
          <span id="channel">Stable</span>
        </div>
      </aside>

      <section class="panel">
        <header>
          <p class="eyebrow" id="stepLabel">Setup</p>
          <h2 id="title">Welcome to the Tsundere Setup Wizard</h2>
          <p id="subtitle">Install the Tsundere language, tooling, and developer ecosystem in just a few minutes.</p>
        </header>

        <section id="content" class="content"></section>

        <footer>
          <button id="back" class="ghost">Back</button>
          <button id="next" class="primary">Next</button>
        </footer>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
